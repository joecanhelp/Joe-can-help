site_name: Joe can help
theme:
  name: material
  logo: assets/favicon.png
  favicon: assets/favicon.png
  palette:
    # 亮色模式設定
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: 切換至暗色模式
    # 暗色模式設定
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: 切換至亮色模式

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true

plugins:
  - search
  - awesome-pages
  - callouts

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js